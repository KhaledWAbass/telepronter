<!DOCTYPE html>
<html lang="en" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>telepronter</title>
    <link rel="icon" href="img/5395980.png" type="image/png">

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/normalize.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="two">
        <div class="save">
            <span class="twos"><i class="fa-solid fa-check"></i></span>
        </div>
        <span>telepronter</span>
    </header>
    <div class="container">
        <div class="bar">

            <input type="text" placeholder="write your Title">
            <div class="title">write your script</div>
        </div>
        <form>
            <textarea class="text" placeholder="write your script Here"></textarea>
        </form>
        <div class="edit">
            <div class="color"><span>The Color</span><input placeholder="write color or code" type="text">
                <div class="sup1">save</div>
            </div>
            <div class="fonts"><span>The Font</span><input placeholder="write font" maxlength="2" type="number">
                <div class="sup1">save</div>
            </div>
            <div class="speed">
                <span>The Speed</span><input placeholder="write speed" maxlength="2" type="number">
                <div class="sup1">save</div>
            </div>
            <div class="bacgroundColor"><span>The Background Color</span><input placeholder="write background color or code" type="text">
                <div class="sup1">save</div>
            </div>
            <div class="bac-color-op"><span>The Background Color Opacity</span><input placeholder="write opacity" maxlength="3" type="number"></div>
            <button>clear</button>
        </div>
    </div>
    <script src="https://kit.fontawesome.com/96a8234fce.js" crossorigin="anonymous"></script>
    <script src="../js/main.js"></script>
</body>

</html>
